{% extends "base.html" %}

{% block title %}Редактирование перевода{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title">
            <i class="fas fa-edit"></i> Редактирование перевода
        </h1>
        <a href="{{ url_for('translations.translations_list') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Таблица</label>
                        <input type="text" class="form-control" value="{{ translation.table_name }}" readonly disabled>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Поле</label>
                        <input type="text" class="form-control" value="{{ translation.field_name }}" readonly disabled>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="display_name" class="form-label">Отображаемое имя</label>
                    <input type="text" class="form-control" id="display_name" name="display_name" 
                           value="{{ translation.display_name }}" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea class="form-control" id="description" name="description" rows="2">{{ translation.description or '' }}</textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="import_enabled" name="import_enabled"
                                   {% if translation.import_enabled %}checked{% endif %}>
                            <label class="form-check-label" for="import_enabled">
                                Разрешить импорт
                            </label>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="export_enabled" name="export_enabled"
                                   {% if translation.export_enabled %}checked{% endif %}>
                            <label class="form-check-label" for="export_enabled">
                                Разрешить экспорт
                            </label>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="display_order" class="form-label">Порядок отображения</label>
                        <input type="number" class="form-control" id="display_order" name="display_order" 
                               value="{{ translation.display_order }}" min="0">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Сохранить
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
