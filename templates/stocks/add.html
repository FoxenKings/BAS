{% extends "base.html" %}

{% block title %}Добавление остатка{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title">
            <i class="fas fa-plus-circle text-success"></i> Добавление остатка на склад
        </h1>
        <a href="{{ url_for('warehouses.stocks_list') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Назад к остаткам
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <form method="POST" class="row g-3">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="col-md-6">
                    <label class="form-label">Номенклатура <span class="text-danger">*</span></label>
                    <select name="nomenclature_id" class="form-select select2" required>
                        <option value="">Выберите материал...</option>
                        {% for n in nomenclatures %}
                        <option value="{{ n.id }}">{{ n.name }} ({{ n.sku }}) - {{ n.unit }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label">Склад <span class="text-danger">*</span></label>
                    <select name="warehouse_id" class="form-select" required>
                        <option value="">Выберите склад...</option>
                        {% for w in warehouses %}
                        <option value="{{ w.id }}">{{ w.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label">Количество <span class="text-danger">*</span></label>
                    <input type="number" name="quantity" class="form-control" 
                           min="0.01" step="0.01" value="1" required>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label">Ячейка (необязательно)</label>
                    <select name="storage_bin_id" class="form-select">
                        <option value="">Без ячейки</option>
                        {% for sb in storage_bins %}
                        <option value="{{ sb.id }}">{{ sb.warehouse_name }} - {{ sb.code }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label">Номер партии (необязательно)</label>
                    <input type="text" name="batch_id" class="form-control" 
                           placeholder="Например: BATCH-001">
                </div>
                
                <div class="col-md-12">
                    <label class="form-label">Основание</label>
                    <input type="text" name="reason" class="form-control" 
                           value="Начальный остаток" placeholder="Например: Поступление от поставщика">
                </div>
                
                <div class="col-12">
                    <hr>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> Добавить остаток
                    </button>
                    <a href="{{ url_for('warehouses.stocks_list') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    // Инициализация Select2 для красивого выбора
    $('.select2').select2({
        theme: 'bootstrap-5',
        width: '100%',
        language: 'ru'
    });
});
</script>
{% endblock %}
