<!-- Модальное окно удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="fas fa-exclamation-triangle"></i> Подтверждение удаления
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="deleteModalMessage">Вы уверены, что хотите удалить этот объект?</p>
                <p class="text-danger"><i class="fas fa-exclamation-circle me-1"></i>Это действие нельзя отменить!</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times me-1"></i>Отмена
                </button>
                <form id="deleteModalForm" method="POST" action="" class="d-inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-1"></i>Удалить
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Универсальная функция открытия модала удаления
function openDeleteModal(url, message) {
    document.getElementById('deleteModalForm').action = url;
    if (message) document.getElementById('deleteModalMessage').textContent = message;
    var modal = new bootstrap.Modal(document.getElementById('deleteModal'));
    modal.show();
}
// Обратная совместимость — старый вызов deleteItem() без аргументов не ломает страницу
function deleteItem() {
    document.getElementById('deleteModalForm').submit();
}
</script>
